    <meta name="theme-color" content="#111111" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        font-family: 'Cormorant Garamond', Georgia, serif;
        background: #111;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* ——————————————————————————————————————
         Layer 1 — Metallic Silver (tin body)
         Near-white center → dark-gray edges.
         Each rim side darkened independently.
         —————————————————————————————————————— */

      .tin {
        position: relative;
        width: min(90vw, 720px, calc(90vh * 1.5));
        aspect-ratio: 3 / 2;
        padding: clamp(3px, 0.7%, 7px);
        border-radius: 10% / 18%;
        background:
          linear-gradient(
            180deg,
            rgba(90, 85, 78, 0.38) 0%,
            rgba(120, 115, 108, 0.1) 22%,
            transparent 44%
          ),
          linear-gradient(
            0deg,
            rgba(90, 85, 78, 0.32) 0%,
            rgba(120, 115, 108, 0.08) 20%,
            transparent 40%
          ),
          linear-gradient(90deg, rgba(90, 85, 78, 0.28) 0%, transparent 22%),
          linear-gradient(270deg, rgba(90, 85, 78, 0.28) 0%, transparent 22%),
          linear-gradient(
            135deg,
            transparent 0%,
            rgba(255, 255, 255, 0.15) 38%,
            rgba(255, 255, 255, 0.25) 45%,
            rgba(255, 255, 255, 0.15) 52%,
            transparent 100%
          ),
          radial-gradient(
            ellipse 65% 56% at 50% 42%,
            #fafaf8 0%,
            #f2f0ec 12%,
            #e8e5e0 28%,
            #dbd7d0 45%,
            #ccc7be 64%,
            #bdb7ad 82%,
            #b0a99e 100%
          );
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.35),
          inset 0 -1px 0 rgba(0, 0, 0, 0.15),
          0 14px 52px rgba(0, 0, 0, 0.55),
          0 4px 14px rgba(0, 0, 0, 0.3),
          0 0 90px rgba(200, 200, 200, 0.05);
        opacity: 0;
        animation: tinReveal 0.9s cubic-bezier(0.23, 1, 0.32, 1) forwards;
      }

      /* ——————————————————————————————————————
         Layer 2 — Terracotta Border Ring
         —————————————————————————————————————— */

      .tin-border {
        width: 100%;
        height: 100%;
        padding: clamp(7px, 1.8%, 16px);
        border-radius: 9% / 17%;
        background: #c4533a;
        box-shadow: inset 0 1px 4px rgba(0, 0, 0, 0.2);
      }

      /* ——————————————————————————————————————
         Layer 3 — Cream Interior (label)
         —————————————————————————————————————— */

      .tin-label {
        position: relative;
        width: 100%;
        height: 100%;
        border-radius: 8% / 15%;
        background: #f6efdd;
        overflow: hidden;
      }

      /* ——————————————————————————————————————
         Pull Tab — no animation, appears with
         the tin. Sized to overlap the banner
         image like the real product.
         —————————————————————————————————————— */

      .pull-tab {
        position: absolute;
        left: clamp(8px, 2.1%, 20px);
        top: 50%;
        transform: translateY(-50%);
        width: clamp(70px, 22%, 165px);
        z-index: 2;
      }

      .pull-tab img {
        width: 100%;
        height: auto;
        object-fit: contain;
        filter: drop-shadow(2px 4px 8px rgba(0, 0, 0, 0.35));
      }

      /* ——————————————————————————————————————
         Label Content
         —————————————————————————————————————— */

      .label-content {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: clamp(6px, 2%, 16px);
      }

      .brand-name {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-weight: 600;
        font-size: clamp(1.6rem, 5.3vw, 3.2rem);
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #1a1008;
        line-height: 1.1;
        margin-bottom: 0;
        opacity: 0;
        animation: fadeDown 0.8s cubic-bezier(0.23, 1, 0.32, 1) 0.7s forwards;
      }

      /* Middle Zone — Olive Art */

      .olive-art {
        flex: 1;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        min-height: 0;
        padding: 0;
        width: 100%;
        opacity: 0;
        animation: fadeIn 0.8s cubic-bezier(0.23, 1, 0.32, 1) 1s forwards;
      }

      .olive-art img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }

      /* Bottom Zone */

      .bottom-zone {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        opacity: 0;
        animation: fadeUp 0.8s cubic-bezier(0.23, 1, 0.32, 1) 1.3s forwards;
      }

      .subtitle {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-weight: 500;
        font-size: clamp(0.6rem, 1.4vw, 0.85rem);
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #1a1008;
        margin-bottom: 2px;
      }

      .arriving {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-weight: 300;
        font-style: italic;
        font-size: clamp(0.75rem, 1.6vw, 1rem);
        color: #c4533a;
        margin-bottom: 10px;
      }

      /* ——————————————————————————————————————
         Email Form
         —————————————————————————————————————— */

      .signup-form {
        display: flex;
        align-items: flex-end;
        gap: 12px;
      }

      .signup-form input[type='email'] {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-style: italic;
        font-size: clamp(0.75rem, 1.3vw, 0.92rem);
        color: #1a1008;
        background: transparent;
        border: none;
        border-bottom: 1px solid rgba(26, 16, 8, 0.3);
        padding: 4px 2px;
        width: clamp(130px, 20vw, 220px);
        outline: none;
        transition: border-color 0.3s ease;
      }

      .signup-form input[type='email']::placeholder {
        color: #1a1008;
        opacity: 0.35;
      }

      .signup-form input[type='email']:focus {
        border-bottom-color: #c4533a;
      }

      .signup-form button {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-weight: 500;
        font-size: clamp(0.58rem, 1vw, 0.72rem);
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: #f6efdd;
        background: #1a1008;
        border: none;
        padding: 7px 16px;
        cursor: pointer;
        white-space: nowrap;
        transition:
          background-color 0.3s ease,
          transform 0.15s ease;
      }

      .signup-form button:hover {
        background: #c4533a;
      }

      .signup-form button:active {
        transform: scale(0.97);
      }

      .snackbar {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%) translateY(100%);
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-style: italic;
        font-size: clamp(0.82rem, 1.4vw, 1rem);
        padding: 14px 28px;
        border-radius: 6px 6px 0 0;
        box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.25);
        z-index: 1000;
        pointer-events: none;
        opacity: 0;
        transition:
          transform 0.4s cubic-bezier(0.23, 1, 0.32, 1),
          opacity 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      }

      .snackbar.visible {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      .snackbar.success {
        background: #1a1008;
        color: #f6efdd;
      }

      .snackbar.error {
        background: #c4533a;
        color: #f6efdd;
      }

      /* ——————————————————————————————————————
         Keyframe Animations
         —————————————————————————————————————— */

      @keyframes tinReveal {
        from {
          opacity: 0;
          transform: scale(0.96);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes fadeDown {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ——————————————————————————————————————
         Portrait Orientation
         —————————————————————————————————————— */

      @media (orientation: portrait) {
        .tin {
          width: min(88vw, 440px, calc(92vh * 0.667));
          aspect-ratio: 2 / 3;
          border-radius: 18% / 10%;
        }

        .tin-border {
          border-radius: 17% / 9%;
          padding: clamp(10px, 3.5%, 24px);
        }

        .tin-label {
          border-radius: 15% / 8%;
        }

        .pull-tab {
          left: 50%;
          top: clamp(22px, 5%, 38px);
          transform: translateX(-50%);
          width: clamp(75px, 28%, 140px);
        }

        .pull-tab img {
          transform: rotate(90deg);
        }

        .label-content {
          justify-content: flex-start;
          padding-top: 10rem;
        }

        @media (max-width: 350px) {
          .label-content {
            justify-content: flex-start;
            padding-top: 7rem;
          }
        }

        .olive-art {
          flex: 0 0 auto;
          width: 100%;
        }

        .brand-name {
          font-size: clamp(1.3rem, 6vw, 2.2rem);
          letter-spacing: 0.15em;
          margin-top: auto;
        }

        .bottom-zone {
          flex: 1;
        }

        .form-wrap {
          margin-top: auto;
        }

        .subtitle {
          font-size: clamp(0.62rem, 2.6vw, 0.88rem);
        }

        .arriving {
          font-size: clamp(0.78rem, 3vw, 1.05rem);
        }

        .signup-form {
          flex-direction: column;
          gap: 10px;
          align-items: center;
        }

        .signup-form input[type='email'] {
          width: clamp(170px, 55vw, 260px);
          text-align: center;
          font-size: clamp(0.82rem, 3.5vw, 1rem);
        }

        .signup-form button {
          font-size: clamp(0.62rem, 2.5vw, 0.78rem);
          padding: 8px 22px;
        }
      }

      /* ——————————————————————————————————————
         Reduced Motion
         —————————————————————————————————————— */

      @media (prefers-reduced-motion: reduce) {
        .tin,
        .brand-name,
        .olive-art,
        .bottom-zone {
          animation: none;
          opacity: 1;
        }

        .snackbar {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="tin">
      <!-- Pull-tab lives here (child of .tin, not .tin-label)
           so it floats above all layers and is never clipped. -->
      <div class="pull-tab">
        <!-- ASSET: Pull-tab image. Swap filename here when replacing with WebP -->
        <img src="pulltab.png" alt="Tin pull-tab" draggable="false" />
      </div>

      <div class="tin-border">
        <div class="tin-label">
          <div class="label-content">
            <h1 class="brand-name">For The Hour</h1>

            <div class="olive-art">
              <!-- ASSET: Olive branch illustration. Swap filename here when replacing with WebP -->
              <img
                src="banner.png"
                alt="Painterly olive branch illustration"
                draggable="false"
              />
            </div>

            <div class="bottom-zone">
              <p class="subtitle">Single-Varietal European Olives</p>
              <p class="arriving">Arriving 2026</p>
              <div class="form-wrap" id="form-container">
                <!-- FORMSPREE: Replace YOUR_FORM_ID with your actual Formspree form ID -->
                <form
                  class="signup-form"
                  id="signup-form"
                  action="https://submit-form.com/cqNWcOvMU"
                  method="POST"
                >
                  <input
                    type="email"
                    name="email"
                    placeholder="your@email.com"
                    required
                    autocomplete="email"
                    aria-label="Email address"
                  />
                  <button type="submit">Join the List</button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="snackbar" id="snackbar" role="status" aria-live="polite"></div>

    <script>
      (function () {
        var form = document.getElementById('signup-form');
        var snackbar = document.getElementById('snackbar');
        var dismissTimer;

        function showSnackbar(message, type) {
          clearTimeout(dismissTimer);
          snackbar.textContent = message;
          snackbar.className = 'snackbar ' + type;

          requestAnimationFrame(function () {
            snackbar.classList.add('visible');
          });

          dismissTimer = setTimeout(function () {
            snackbar.classList.remove('visible');
          }, 4000);
        }

        form.addEventListener('submit', function (e) {
          e.preventDefault();

          var data = new FormData(form);
          var button = form.querySelector('button');
          button.textContent = 'Sending\u2026';
          button.disabled = true;

          fetch(form.action, {
            method: 'POST',
            body: data,
            headers: { Accept: 'application/json' },
          })
            .then(function (response) {
              if (response.ok) {
                form.reset();
                showSnackbar(
                  'You\u2019re on the list \u2014 we\u2019ll be in touch.',
                  'success',
                );
              } else {
                throw new Error('Form submission failed');
              }
            })
            .catch(function () {
              showSnackbar('Something went wrong. Please try again.', 'error');
            })
            .finally(function () {
              button.textContent = 'Join the List';
              button.disabled = false;
            });
        });
      })();
    </script>
  </body>
